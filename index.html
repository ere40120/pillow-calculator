<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>재단 계산기</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="재단계산기" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --card2: #0f172a;
      --border: #334155;
      --border2: #1e293b;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --primary: #818cf8;
      --primary-dark: #4f46e5;
      --success: #34d399;
      --warning: #fbbf24;
      --danger: #f87171;
      --radius: 14px;
    }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 48px;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
      padding: 24px 20px 18px;
      text-align: center;
      border-bottom: 1px solid #3730a3;
    }
    header h1 { font-size: 1.25rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    header p { font-size: 0.78rem; color: #a5b4fc; margin-top: 4px; }

    /* ── Container ── */
    .container { max-width: 560px; margin: 0 auto; padding: 14px 14px; }

    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .card-title {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Form ── */
    .field { margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .input-wrap { position: relative; }
    input[type="number"],
    input[type="text"] {
      width: 100%;
      padding: 10px 38px 10px 12px;
      background: var(--card2);
      border: 1.5px solid var(--border);
      border-radius: 9px;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
      -webkit-appearance: none;
    }
    input[type="number"]:focus,
    input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(129,140,248,0.15);
    }
    input[type="text"] { padding-right: 12px; }
    .unit {
      position: absolute;
      right: 11px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.75rem;
      color: var(--muted);
      pointer-events: none;
      font-weight: 600;
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%;
      padding: 12px;
      background: var(--primary-dark);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: -0.2px;
    }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:active { transform: scale(0.98); }

    .btn-sm {
      padding: 8px 14px;
      background: var(--card2);
      color: var(--muted);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-sm:hover { border-color: var(--primary); color: var(--primary); }

    /* ── Color picker ── */
    .color-picker { display: flex; gap: 7px; flex-wrap: wrap; }
    .color-dot {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.12s, border-color 0.12s;
      flex-shrink: 0;
    }
    .color-dot:hover { transform: scale(1.18); }
    .color-dot.selected {
      border-color: #fff;
      transform: scale(1.18);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
    }

    /* ── Saved size chips ── */
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 14px;
    }
    .sz-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px 5px 11px;
      background: var(--card2);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .sz-chip:hover { border-color: var(--primary); color: var(--primary); }
    .sz-chip .sz-del {
      font-size: 0.65rem;
      color: var(--border);
      line-height: 1;
      padding: 1px 2px;
      border-radius: 50%;
      transition: color 0.12s;
    }
    .sz-chip:hover .sz-del { color: var(--danger); }

    /* ── Item list ── */
    .items-list { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
    .item-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--card2);
      border: 1px solid var(--border);
      border-left: 4px solid transparent;
      border-radius: 10px;
      padding: 10px 12px;
    }
    .item-swatch { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 0.88rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-size { font-size: 0.74rem; color: var(--muted); margin-top: 1px; }
    .item-cnt {
      background: rgba(129,140,248,0.14);
      color: var(--primary);
      font-size: 0.74rem;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 20px;
      flex-shrink: 0;
    }
    .item-del {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--border);
      border: none;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.12s, color 0.12s;
    }
    .item-del:hover { background: var(--danger); color: #fff; }

    /* ── Preset chips ── */
    .preset-row { display: flex; flex-wrap: wrap; gap: 7px; }
    .preset-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px 5px 12px;
      background: var(--card2);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .preset-chip:hover { border-color: var(--primary); color: var(--primary); }
    .preset-chip .p-del {
      font-size: 0.65rem;
      color: var(--border);
      transition: color 0.12s;
    }
    .preset-chip:hover .p-del { color: var(--danger); }

    .save-row { display: flex; gap: 8px; margin-top: 12px; }
    .save-row input { flex: 1; padding-right: 12px; }

    /* ── Divider ── */
    .divider { height: 1px; background: var(--border); margin: 14px 0; }

    /* ── Empty ── */
    .empty { text-align: center; color: var(--muted); font-size: 0.8rem; padding: 12px 0; }

    /* ── Canvas ── */
    #viz-canvas {
      width: 100%;
      display: block;
      border-radius: 10px;
      background: #0d1117;
      border: 1px solid var(--border);
    }

    /* ── Legend ── */
    .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .leg-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.74rem; color: var(--muted);
    }
    .leg-dot { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }

    /* ── Stats ── */
    .stats-row { display: flex; gap: 8px; margin-top: 10px; }
    .stat {
      flex: 1;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
    }
    .stat-val { font-size: 1.3rem; font-weight: 800; line-height: 1; }
    .stat-lbl { font-size: 0.68rem; color: var(--muted); margin-top: 3px; }
    .stat-val.green { color: var(--success); }
    .stat-val.yellow { color: var(--warning); }
    .stat-val.red { color: var(--danger); }
    .stat-val.blue { color: var(--primary); }

    /* ── Hint ── */
    .hint { font-size: 0.73rem; color: var(--muted); margin-top: 6px; line-height: 1.5; }

    /* ── Checkbox ── */
    .check-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .check-row input[type="checkbox"] { width: auto; accent-color: var(--primary); cursor: pointer; }
    .check-row label { margin-bottom: 0; font-size: 0.8rem; cursor: pointer; }

    /* ── Footer ── */
    footer { text-align: center; color: var(--muted); font-size: 0.72rem; margin-top: 20px; }
  </style>
</head>
<body>

<header>
  <h1>✂️ 재단 계산기</h1>
  <p>사각형 재단 레이아웃 실시간 시각화</p>
</header>

<div class="container">

  <!-- ① 재단판 설정 -->
  <div class="card">
    <div class="card-title">📐 재단판 설정</div>
    <div class="grid-3">
      <div class="field">
        <label>가로 (W)</label>
        <div class="input-wrap">
          <input type="number" id="board-w" value="150" min="1" step="1">
          <span class="unit">cm</span>
        </div>
      </div>
      <div class="field">
        <label>세로 (H)</label>
        <div class="input-wrap">
          <input type="number" id="board-h" value="200" min="1" step="1">
          <span class="unit">cm</span>
        </div>
      </div>
      <div class="field">
        <label>칼밥</label>
        <div class="input-wrap">
          <input type="number" id="kalbab" value="3" min="0" step="0.5">
          <span class="unit">cm</span>
        </div>
      </div>
    </div>
    <div class="hint">💡 칼밥: 원단 끝 수평을 맞추기 위해 나라시 후 잘라내는 길이</div>
  </div>

  <!-- ② 재단 사이즈 추가 -->
  <div class="card">
    <div class="card-title">✂️ 재단 사이즈 추가</div>

    <!-- 저장된 사이즈 빠른 선택 -->
    <div id="saved-sz-area" style="display:none;">
      <div style="font-size:0.72rem; color:var(--muted); font-weight:700; margin-bottom:7px;">저장된 사이즈 — 탭하여 폼에 불러오기</div>
      <div class="chip-row" id="saved-sz-chips"></div>
      <div class="divider"></div>
    </div>

    <!-- 입력 폼 -->
    <div class="grid-2">
      <div class="field">
        <label>이름</label>
        <input type="text" id="item-name" placeholder="예: 앞판">
      </div>
      <div class="field">
        <label>수량</label>
        <div class="input-wrap">
          <input type="number" id="item-cnt" value="1" min="1" step="1">
          <span class="unit">개</span>
        </div>
      </div>
    </div>
    <div class="grid-2">
      <div class="field">
        <label>가로 (W)</label>
        <div class="input-wrap">
          <input type="number" id="item-w" placeholder="0" min="1">
          <span class="unit">cm</span>
        </div>
      </div>
      <div class="field">
        <label>세로 (H)</label>
        <div class="input-wrap">
          <input type="number" id="item-h" placeholder="0" min="1">
          <span class="unit">cm</span>
        </div>
      </div>
    </div>

    <div class="field">
      <label>색상</label>
      <div class="color-picker" id="color-picker"></div>
    </div>

    <div class="check-row">
      <input type="checkbox" id="do-save-sz">
      <label for="do-save-sz">이 사이즈를 저장목록에 추가</label>
    </div>

    <button class="btn-primary" onclick="addItem()">+ 재단 추가</button>

    <!-- 추가된 아이템 목록 -->
    <div class="items-list" id="items-list"></div>
  </div>

  <!-- ③ 세트 저장 / 불러오기 -->
  <div class="card">
    <div class="card-title">💾 세트 저장 · 불러오기</div>
    <div class="preset-row" id="preset-row">
      <div class="empty" id="no-preset">저장된 세트가 없습니다</div>
    </div>
    <div class="save-row">
      <input type="text" id="preset-name-inp" placeholder="세트 이름 입력 후 저장">
      <button class="btn-sm" onclick="savePreset()">저장</button>
    </div>
  </div>

  <!-- ④ 재단 시각화 -->
  <div class="card">
    <div class="card-title">📊 재단 시각화</div>
    <canvas id="viz-canvas"></canvas>
    <div class="legend" id="legend"></div>
    <div class="stats-row">
      <div class="stat">
        <div class="stat-val green" id="s-fit">0</div>
        <div class="stat-lbl">재단 가능</div>
      </div>
      <div class="stat">
        <div class="stat-val red" id="s-over">0</div>
        <div class="stat-lbl">초과</div>
      </div>
      <div class="stat">
        <div class="stat-val blue" id="s-util">0%</div>
        <div class="stat-lbl">원단 활용률</div>
      </div>
    </div>
  </div>

  <footer>재단 계산기 v2.0</footer>
</div>

<script>
/* ═══════════════════════════════════════════════════
   상수 & 상태
═══════════════════════════════════════════════════ */
const COLORS = [
  '#ef4444', // 빨강
  '#3b82f6', // 파랑
  '#eab308', // 노랑
  '#22c55e', // 초록
  '#f97316', // 주황
  '#a855f7', // 보라
  '#ec4899', // 핑크
  '#06b6d4', // 청록
  '#f43f5e', // 로즈
  '#84cc16', // 라임
];

const LS_SIZES   = 'jaedanSizes';
const LS_PRESETS = 'jaedanPresets';
const LS_BOARD   = 'jaedanBoard';

let items        = [];   // { id, name, width, height, count, color }
let nextId       = 1;
let selColor     = COLORS[0];

/* ═══════════════════════════════════════════════════
   초기화
═══════════════════════════════════════════════════ */
function init() {
  // 컬러 피커
  const cp = document.getElementById('color-picker');
  COLORS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'color-dot' + (c === selColor ? ' selected' : '');
    d.style.background = c;
    d.dataset.color = c;
    d.onclick = () => setColor(c);
    cp.appendChild(d);
  });

  // 저장된 보드 설정 불러오기
  const b = loadJSON(LS_BOARD);
  if (b) {
    setVal('board-w', b.w);
    setVal('board-h', b.h);
    setVal('kalbab',  b.k);
  }

  // 실시간 이벤트
  ['board-w','board-h','kalbab'].forEach(id =>
    $id(id).addEventListener('input', () => { persistBoard(); redraw(); })
  );

  renderSavedSizes();
  renderPresets();
  renderItems();
  redraw();
}

/* ═══════════════════════════════════════════════════
   색상 선택
═══════════════════════════════════════════════════ */
function setColor(c) {
  selColor = c;
  document.querySelectorAll('.color-dot').forEach(d => {
    d.classList.toggle('selected', d.dataset.color === c);
  });
}

/* ═══════════════════════════════════════════════════
   아이템 추가 / 삭제
═══════════════════════════════════════════════════ */
function addItem() {
  const name  = $id('item-name').value.trim() || `조각${nextId}`;
  const w     = parseFloat($id('item-w').value);
  const h     = parseFloat($id('item-h').value);
  const count = Math.max(1, parseInt($id('item-cnt').value) || 1);

  if (!w || !h || w <= 0 || h <= 0) {
    alert('가로/세로 사이즈를 입력해주세요.');
    return;
  }

  // 사이즈 저장
  if ($id('do-save-sz').checked) {
    addSavedSize(name, w, h);
  }

  // 색상: 이미 쓰인 색이면 다음 색으로
  const usedColors = items.map(i => i.color);
  let color = selColor;
  if (usedColors.includes(color)) {
    const next = COLORS.find(c => !usedColors.includes(c));
    if (next) { color = next; setColor(next); }
  }

  items.push({ id: nextId++, name, width: w, height: h, count, color });

  // 폼 초기화
  $id('item-name').value = '';
  $id('item-w').value = '';
  $id('item-h').value = '';
  $id('item-cnt').value = 1;
  $id('do-save-sz').checked = false;

  renderItems();
  redraw();
}

function deleteItem(id) {
  items = items.filter(i => i.id !== id);
  renderItems();
  redraw();
}

function renderItems() {
  const el = $id('items-list');
  if (!items.length) {
    el.innerHTML = '<div class="empty">재단 사이즈를 추가해주세요</div>';
    return;
  }
  el.innerHTML = items.map(it => `
    <div class="item-row" style="border-left-color:${it.color}">
      <div class="item-swatch" style="background:${it.color}"></div>
      <div class="item-info">
        <div class="item-name">${esc(it.name)}</div>
        <div class="item-size">${it.width} × ${it.height} cm</div>
      </div>
      <div class="item-cnt">×${it.count}</div>
      <button class="item-del" onclick="deleteItem(${it.id})">✕</button>
    </div>
  `).join('');
}

/* ═══════════════════════════════════════════════════
   저장된 사이즈 (개별 사이즈 빠른 선택)
═══════════════════════════════════════════════════ */
function getSavedSizes() { return loadJSON(LS_SIZES) || []; }

function addSavedSize(name, w, h) {
  const list = getSavedSizes();
  if (!list.find(s => s.w === w && s.h === h)) {
    list.push({ name, w, h });
    saveJSON(LS_SIZES, list);
    renderSavedSizes();
  }
}

function deleteSavedSize(i) {
  const list = getSavedSizes();
  list.splice(i, 1);
  saveJSON(LS_SIZES, list);
  renderSavedSizes();
}

function loadSavedSize(i) {
  const sz = getSavedSizes()[i];
  if (!sz) return;
  $id('item-name').value = sz.name;
  $id('item-w').value    = sz.w;
  $id('item-h').value    = sz.h;
  $id('item-cnt').value  = 1;
}

function renderSavedSizes() {
  const list = getSavedSizes();
  const area = $id('saved-sz-area');
  const row  = $id('saved-sz-chips');
  if (!list.length) { area.style.display = 'none'; return; }
  area.style.display = 'block';
  row.innerHTML = list.map((sz, i) => `
    <div class="sz-chip">
      <span onclick="loadSavedSize(${i})">${esc(sz.name)} (${sz.w}×${sz.h})</span>
      <span class="sz-del" onclick="deleteSavedSize(${i})">✕</span>
    </div>
  `).join('');
}

/* ═══════════════════════════════════════════════════
   세트 저장 / 불러오기
═══════════════════════════════════════════════════ */
function getPresets() { return loadJSON(LS_PRESETS) || []; }

function savePreset() {
  const name = $id('preset-name-inp').value.trim();
  if (!name) { alert('세트 이름을 입력해주세요.'); return; }
  if (!items.length) { alert('재단 사이즈를 먼저 추가해주세요.'); return; }
  const list = getPresets();
  list.push({
    name,
    items: JSON.parse(JSON.stringify(items)),
    board: getBoard(),
    date: new Date().toLocaleDateString('ko-KR')
  });
  saveJSON(LS_PRESETS, list);
  $id('preset-name-inp').value = '';
  renderPresets();
}

function loadPreset(i) {
  const p = getPresets()[i];
  if (!p) return;
  items  = p.items.map(it => ({ ...it }));
  nextId = Math.max(0, ...items.map(it => it.id)) + 1;
  setVal('board-w', p.board.w);
  setVal('board-h', p.board.h);
  setVal('kalbab',  p.board.k);
  persistBoard();
  renderItems();
  redraw();
}

function deletePreset(i) {
  const list = getPresets();
  list.splice(i, 1);
  saveJSON(LS_PRESETS, list);
  renderPresets();
}

function renderPresets() {
  const list = getPresets();
  const row  = $id('preset-row');
  if (!list.length) {
    row.innerHTML = '<div class="empty" id="no-preset">저장된 세트가 없습니다</div>';
    return;
  }
  row.innerHTML = list.map((p, i) => `
    <div class="preset-chip">
      <span onclick="loadPreset(${i})">${esc(p.name)}</span>
      <span class="p-del" onclick="deletePreset(${i})">✕</span>
    </div>
  `).join('');
}

/* ═══════════════════════════════════════════════════
   보드 설정
═══════════════════════════════════════════════════ */
function getBoard() {
  return {
    w: parseFloat($id('board-w').value) || 150,
    h: parseFloat($id('board-h').value) || 200,
    k: parseFloat($id('kalbab').value)  || 0
  };
}
function persistBoard() { saveJSON(LS_BOARD, getBoard()); }

/* ═══════════════════════════════════════════════════
   패킹 알고리즘 (행(row) 우선 배치)
═══════════════════════════════════════════════════ */
function packItems(bw, bh, trim) {
  const usable = bh - trim;
  const result = [];
  let x = 0, rowY = 0, rowH = 0;

  // 수량 전개
  const expanded = [];
  items.forEach(it => {
    for (let n = 0; n < it.count; n++) expanded.push(it);
  });

  expanded.forEach(it => {
    // 폭 초과
    if (it.width > bw) {
      result.push({ it, overflow: true, reason: '폭 초과' });
      return;
    }
    // 현재 행에 안 들어가면 다음 행으로
    if (x + it.width > bw) {
      rowY += rowH;
      x = 0;
      rowH = 0;
    }
    // 높이 초과
    if (rowY + it.height > usable) {
      result.push({ it, overflow: true, reason: '길이 초과' });
      return;
    }
    result.push({ it, x, y: trim + rowY, overflow: false });
    rowH = Math.max(rowH, it.height);
    x += it.width;
  });

  return result;
}

/* ═══════════════════════════════════════════════════
   캔버스 그리기
═══════════════════════════════════════════════════ */
function redraw() {
  const canvas = $id('viz-canvas');
  const ctx    = canvas.getContext('2d');
  const { w: bw, h: bh, k: trim } = getBoard();

  /* 캔버스 크기 설정 */
  const dpr       = window.devicePixelRatio || 1;
  const dispW     = canvas.clientWidth || 360;
  const aspect    = bh / bw;
  const maxDispH  = Math.min(500, Math.round(dispW * aspect));
  const dispH     = Math.min(dispW * aspect, maxDispH);

  canvas.width  = Math.round(dispW * dpr);
  canvas.height = Math.round(dispH * dpr);
  canvas.style.height = Math.round(dispH) + 'px';
  ctx.scale(dpr, dpr);

  const pad   = 14;
  const scale = Math.min((dispW - pad*2) / bw, (dispH - pad*2) / bh);
  const ox    = (dispW - bw * scale) / 2;
  const oy    = (dispH - bh * scale) / 2;

  /* 배경 */
  ctx.clearRect(0, 0, dispW, dispH);

  /* 재단판 (검정) */
  ctx.fillStyle   = '#111827';
  ctx.strokeStyle = '#4b5563';
  ctx.lineWidth   = 1.5;
  roundRect(ctx, ox, oy, bw * scale, bh * scale, 4, true, true);

  /* 칼밥 구역 (사선 해칭 + 노란 점선) */
  if (trim > 0) {
    const th = trim * scale;
    ctx.save();
    ctx.beginPath();
    ctx.rect(ox, oy, bw * scale, th);
    ctx.clip();

    // 반투명 노랑 배경
    ctx.fillStyle = 'rgba(251,191,36,0.10)';
    ctx.fillRect(ox, oy, bw * scale, th);

    // 사선
    ctx.strokeStyle = 'rgba(251,191,36,0.28)';
    ctx.lineWidth   = 1;
    const step = 9;
    for (let i = -bh * scale; i < bw * scale + th; i += step) {
      ctx.beginPath();
      ctx.moveTo(ox + i, oy);
      ctx.lineTo(ox + i + th, oy + th);
      ctx.stroke();
    }
    ctx.restore();

    // 점선 경계
    ctx.save();
    ctx.strokeStyle = '#fbbf24';
    ctx.lineWidth   = 1.5;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    ctx.moveTo(ox, oy + th);
    ctx.lineTo(ox + bw * scale, oy + th);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // 라벨
    const fontSize = clamp(Math.floor(th * 0.45), 9, 12);
    ctx.fillStyle   = '#fbbf24';
    ctx.font        = `bold ${fontSize}px sans-serif`;
    ctx.textAlign   = 'center';
    ctx.textBaseline = 'middle';
    if (th >= 13) ctx.fillText(`칼밥 ${trim}cm`, ox + bw * scale / 2, oy + th / 2);
  }

  /* 패킹된 조각 그리기 */
  const placements = packItems(bw, bh, trim);

  placements.forEach(p => {
    if (p.overflow) return;
    const rx = ox + p.x  * scale;
    const ry = oy + p.y  * scale;
    const rw = p.it.width  * scale;
    const rh = p.it.height * scale;

    // 반투명 채우기
    ctx.fillStyle = p.it.color + '44';
    ctx.fillRect(rx, ry, rw, rh);

    // 테두리
    ctx.strokeStyle = p.it.color;
    ctx.lineWidth   = 1.5;
    ctx.strokeRect(rx + 0.75, ry + 0.75, rw - 1.5, rh - 1.5);

    // 치수 라벨
    if (rw > 22 && rh > 15) {
      const fs = clamp(Math.floor(Math.min(rw, rh) * 0.22), 8, 11);
      ctx.fillStyle    = p.it.color;
      ctx.font         = `bold ${fs}px sans-serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      const lbl = rw > 36 ? `${p.it.width}×${p.it.height}` : '';
      if (lbl) ctx.fillText(lbl, rx + rw / 2, ry + rh / 2);
    }
  });

  /* 치수 표기 */
  ctx.fillStyle    = '#4b5563';
  ctx.font         = '10px sans-serif';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(`${bw} cm`, ox + bw * scale / 2, oy + bh * scale + 4);
  ctx.textAlign    = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillText(`${bh} cm`, ox - 4, oy + bh * scale / 2);

  /* 범례 */
  const legend = $id('legend');
  legend.innerHTML = items.map(it => `
    <div class="leg-item">
      <div class="leg-dot" style="background:${it.color}"></div>
      <span>${esc(it.name)} ${it.width}×${it.height} ×${it.count}</span>
    </div>
  `).join('');

  /* 통계 */
  const fit  = placements.filter(p => !p.overflow).length;
  const over = placements.filter(p =>  p.overflow).length;
  const usableArea = bw * Math.max(bh - trim, 0);
  const usedArea   = placements
    .filter(p => !p.overflow)
    .reduce((s, p) => s + p.it.width * p.it.height, 0);
  const util = usableArea > 0 ? Math.round(usedArea / usableArea * 100) : 0;

  $id('s-fit').textContent  = fit;
  $id('s-over').textContent = over;
  $id('s-util').textContent = util + '%';

  return placements;
}

/* ═══════════════════════════════════════════════════
   유틸
═══════════════════════════════════════════════════ */
function $id(id)         { return document.getElementById(id); }
function setVal(id, v)   { $id(id).value = v; }
function esc(s)          { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function clamp(v, mn, mx){ return Math.max(mn, Math.min(mx, v)); }
function loadJSON(k)     { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } }
function saveJSON(k, v)  { localStorage.setItem(k, JSON.stringify(v)); }

function roundRect(ctx, x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill)   ctx.fill();
  if (stroke) ctx.stroke();
}

/* ═══════════════════════════════════════════════════
   시작
═══════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', init);
window.addEventListener('resize', redraw);
</script>
